# cli_def_subcommand_w_template.toml

title = "CLI definition"

[cli] # cli[.<command>[.<subcommand>]]
key = "MyCLI"
help = "HELP"

[cli.command1]
help = "HELP of command1"
#group = "subcommand"

[cli.command1._subcommand_templ_1] # startswith "_" means command template
args =  [
    {key = "positional_param1", mult = "1", type = "str", spec_type = "path"},
    {key = "optional_option", option = "--option", mult = "?", type = "str"},
]
[cli.command1._subcommand_templ_2] # startswith "_" means command template
args =  [
    {key = "flag_option", is_flag = true, option = "--flag", default = false},
    {key = "choice_option", option = "--choice", default="a", choices = ["a", "b", "c"], mult = "?", type = "str"},
]

[cli.command1.subcommand1_1]
help = "HELP of subcommand1_1"
# subcommand1_1 inherits arguments from template "command1/_subcommand_templ_{1,2}" implicitly

[cli.command1.subcommand1_2]
help = "HELP of subcommand1_2"
inherit_from = ["_subcommand_templ_1", "_subcommand_templ_2"] # subcommand1_2 inherits arguments from template "command1/_subcommand_templ_{1,2}" explicitly

[cli.command1.subcommand1_3]
help = "HELP of subcommand1_3"
inherit_from = ["_subcommand_templ_2"] # subcommand1_3 inherits arguments from template "command1/_subcommand_templ_2" only

[cli.command1.subcommand1_4]
help = "HELP of subcommand1_4"
inherit_from = [] # subcommand1_4 defys inheritance

[cli.command2]
help = "HELP of command2"
group = "subcommand"

[cli.command2._subcommand2] # startswith "_" means command template
args =  [
    {key = "positional_param2", mult = 1, type = "str", spec_type = "path"},
    {key = "optional_option2", option = "--option", mult = "?", type = "str"},
    {key = "flag_option2", is_flag = true, option = "--flag", default = false},
    {key = "choice_option2", option = "--choice", default="a", choices = ["a", "b", "c"], mult = "?", type = "str"},
]

[cli.command2.subcommand2_1]
help = "HELP of subcommand2_1"
# subcommand2_1 inherits arguments from template "command2/_subcommand"
bind = {"positional_param2" = "fixed2_1"}

[cli.command2.subcommand2_2]
help = "HELP of subcommand2_2"
# subcommand2_1 inherits arguments from template "command2/_subcommand"
bind = {"positional_param2" = "fixed2_2"}


[cli.command3]
help = "HELP of command3"

[cli.command4]
help = "HELP of command4"
inherit_from = ["/MyCLI/command1/_subcommand_templ_1"]
bind = {"positional_param1" = "fixed4", "optional_option" = "fixed_option4"}
