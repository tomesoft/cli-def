# cli_def_validation.toml

[cli] # cli[.<command>[.<subcommand>]]
key = "MyCLI"
help = "for validation test"

[cli._command_templ_1] # startswith "_" means command template
args =  [ # common args for the same layer commands
    {key = "positional_param1", mult = 1, type = "str", spec_type = "path"},
    {key = "optional_option", option = "--option", mult = "?", type = "str"},
]
[cli._command_templ_2] # startswith "_" means command template
args =  [ # common args for the same layer commands
    {key = "flag_option", option = "--flag", is_flag = true,  default = false},
    {key = "choice_option", option = "--choice", default="a", choices = ["a", "b", "c"], mult = "?", type = "str"},
]

[cli.command1]
help = "HELP of command1"
inherit_from = ["*"] # command1 inherits arguments from "_command_templ_1" and "_command_templ_2"
bind = {flag_option="WRONG_VALUE"} # error#1 wrong type

[cli.command2]
help = "HELP of command2"
inherit_from = ["_command_templ_1", "_command_templ_2"] # command2 inherits arguments from "_command_tmpl_1" and "_command_tmpl_2" explicitly
bind = {optional_option=99} #error#2  wrong type

[cli.command3]
help = "HELP of command3"
inherit_from = ["_command_templ_2"] # command3 inherits arguments from "_command_tmpl_2" only
bind = {choice_option="ZZZ"} # error#3 wrong choice

[cli.command4]
help = "HELP of command4"
inherit_from = [] # command4 defys inheritance
bind = {positional_param1="invalid_binding"} # warning#1 invalid binding

[cli.command5]
help = "HELP of command5"
inherit_from = ["_command_templ_1"]
bind = {positional_param1=["a", "b"]} # error#4 wrong mult

[cli.command6]
help = "HELP of command6"
args =  [ # error#5 "--option" duplicate
    {key = "optional_option2", option = "--option", mult = "?", type = "str"},
]
inherit_from = ["_command_templ_1"]

[cli.command7]
help = "HELP of command7"
args =  [ # error#6 alias "-O" confilict
    {key = "optional_option1", option = "--option1", aliases=["-O"], mult = "?", type = "str"},
    {key = "optional_option2", option = "--option2", aliases=["-O"], mult = "?", type = "str"},
]

[cli.command8]
help = "HELP of command8"
args =  [ # error#6 alias "-O" confilict
    {key = "positional_option", mult = "*", type = "str"},
]
bind = {positional_option=["a", "b", "c", "d"]}