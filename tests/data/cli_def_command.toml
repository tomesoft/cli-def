# cli_def_command.toml

title = "CLI definition"

[cli] # cli[.<command>[.<subcommand>]]
"key"="MyCLI"
"help"="HELP"

[cli.command1]
"help"="HELP of command1"
# command1 has no argument

[cli.command2]
"help"="HELP of command2"
"args"= [
    {"key"="positional_param1", "mult"="1", "type"="str", "spec_type"="path"},
    {"key"="optional_option", "option"="--option", "mult"="?", "type"="str"},
    {"key"="flag_option", "is_flag"=true, "option"="--flag", "default"=false},
    {"key"="choice_option", "option"="--choice", default="a", "choices"=["a", "b", "c"], "mult"="?", "type"="str"},
]

[cli.command3]
"help"="HELP of command3"
# command3 has no argument